<!DOCTYPE html>
<head>
  <title>Canvas - Dashboard</title>
  <style>
    body {
      background-color: #121212; 
    }
    
    .header {
      font-size: 50px;
      color: white;
      text-align: center;
      
      padding: 15px;
    }
    
    .Game {
       background-color: #575757;
    }
    
    .Games {
      width: 100%;
      height 100%;
      
      display: grid;
      grid-gap: 10px;
      grid-template-columns: repeat(5, 1fr);  
    }
    
    #version {
      position: fixed;
      bottom: 0;
    }
  </style>
</head>
<body>
  <div class="header">UNBLOCKED GAMES</div>
  <div class="Games">
    <div class="Game">Game 1</div>
    <div class="Game">Game 2</div>
    <div class="Game">Game 3</div>
    <div class="Game">Game 4</div>
    <div class="Game">Game 5</div>
  </div>
  <div id="version">Version: 0.005</div>
</body>
