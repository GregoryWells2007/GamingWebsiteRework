<!DOCTYPE html>
<head>
  <title>Canvas - Dashboard</title>
  <style>
    body {
      background-color: #121212; 
    }
    
    .header {
      font-size: 50px;
      color: white;
      text-align: center;
      
      padding: 15px;
    }
    
    .Game {
       border-style: solid;
       border-size: 5px;
       border-color: #353535;
       
       padding: 10px;
       height: 20rem;
       background-color: #575757;
    }
    
    .Game:hover {
      border-color: #505050;
      border-size: 8px;
      height: 25rem;
    }
    
    .Games {
      width: 100%;
      height 100%;
      display: grid;
      grid-gap: 10px;
      grid-template-columns: repeat(5, 1fr);  
    }
    
    #version {
      position: fixed;
      bottom: 0;
    }
  </style>
</head>
<body>
  <div class="header">UNBLOCKED GAMES</div>
  <div class="Games">
    <div class="Game"> <center>Tetris</center> </div>
    <div class="Game"> <center>Hextris</center> </div>
    <div class="Game"> <center>Snake</center> </div>
    <div class="Game"> <center>Cool Racing Game</center> </div>
    <div class="Game"> <center>Cookie Clicker</center> </div>
  </div>
  <div id="version">Version: 0.009</div>
</body>
