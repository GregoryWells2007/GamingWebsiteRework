<!DOCTYPE html>
<head>
  <title>Canvas - Dashboard</title>
  <style>
    body {
      background-color: #121212; 
    }
    
    .header {
      font-size: 50px;
      color: white;
      text-align: center;
      
      padding: 15px;
    }
    
    .Game {
       border-style: solid;
       border-size: 2px;
       border-color: #353535;
       box-shadow: 3px 3px 8px #888888;
       padding: 10px;
       height: 20rem;
       background-color: #575757;
    }
    
    .Game:hover {
       border-color: #fff;
       box-shadow: 7px 7px 8px #888888;
       transition: border-color 0.5s, box-shadow 0.5s;
    }
    
    .Games {
      width: 100%;
      height 100%;
      display: grid;
      grid-gap: 10px;
      grid-template-columns: repeat(5, 1fr);  
    }
    
    #version {
      position: fixed;
      bottom: 0;
    }
    
    .GameName {
      font-size: 25px;
      color: #909090;
    }
  </style>
</head>
<body>
  <div class="header">UNBLOCKED GAMES</div>
  <div class="Games">
    <div class="Game"><p class="GameName">Tetris          </p></div>
    <div class="Game"><p class="GameName">Hextris         </p></div>
    <div class="Game"><p class="GameName">Snake           </p></div>
    <div class="Game"><p class="GameName">Cool Racing Game</p></div>
    <div class="Game"><p class="GameName">Cookie Clicker  </p></div>
  </div>
  <div id="version">Version: 0.013</div>
</body>
